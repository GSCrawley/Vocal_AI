pre-commit:
  parallel: false
  commands:
    prettier:
      glob: '**/*.{ts,tsx,js,mjs,cjs,json,md,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '**/*.{ts,tsx,js,mjs,cjs}'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
