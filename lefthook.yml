pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{ts,tsx,js,mjs,cjs,json,md,yml,yaml}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{ts,tsx,js,mjs}'
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
