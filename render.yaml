# Render Blueprint for VOICE.
# Schema: https://render.com/schema/render.yaml.json
#
# This blueprint declares the infrastructure the project will need as the
# scaffold is fleshed out. Some commands and Dockerfiles referenced here are
# build targets for the corresponding agents in AGENT.MD and will not deploy
# successfully until those services are implemented.

version: "1"

previews:
  generation: manual
  expireAfterDays: 7

envVarGroups:
  - name: voice-shared-env
    envVars:
      - key: APP_ENV
        value: production
        previewValue: preview
      - key: NODE_ENV
        value: production
        previewValue: development
      - key: LOG_LEVEL
        value: info
        previewValue: debug
      - key: VITE_API_BASE_URL
        sync: false
      - key: AUDIO_STORAGE_OPT_IN_DEFAULT
        value: "false"
      - key: FEATURE_KARAOKE_MODE
        value: "false"
      - key: FEATURE_STYLE_PACKS
        value: "false"
      - key: FEATURE_REALTIME_FILLER_DETECTION
        value: "false"
      - key: FEATURE_AVATAR_TTS
        value: "false"

  - name: voice-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET_AUDIO
        value: user-audio
      - key: SUPABASE_STORAGE_BUCKET_KARAOKE
        value: karaoke-assets
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: EXPO_PROJECT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

  - name: voice-audio-env
    envVars:
      - key: AUDIO_MODEL_CACHE_DIR
        value: /var/cache/voice-audio
      - key: DEMUCS_MODEL
        value: htdemucs
      - key: WHISPER_MODEL
        value: medium
      - key: AUDIO_PROCESSING_CONCURRENCY
        value: "1"
      - key: AUDIO_MAX_UPLOAD_MB
        value: "250"

databases:
  # Render-managed Postgres for API persistence. If the production build uses
  # Supabase-hosted Postgres exclusively, remove this database and the
  # DATABASE_URL references below, while keeping the Supabase env vars.
  - name: voice-postgres
    databaseName: voice
    user: voice_app
    region: oregon
    plan: starter
    previewPlan: starter
    diskSizeGB: 10
    previewDiskSizeGB: 1
    postgresMajorVersion: "16"
    storageAutoscalingEnabled: true
    highAvailability:
      enabled: false
    ipAllowList: []

services:
  - type: keyvalue
    name: voice-redis
    region: oregon
    plan: starter
    previewPlan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: voice-api
    region: oregon
    runtime: node
    plan: starter
    numInstances: 1
    healthCheckPath: /healthz
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/api build
    startCommand: node services/api/dist/index.js
    autoDeploy: true
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 60
    previews:
      generation: manual
      plan: starter
      numInstances: 1
    buildFilter:
      paths:
        - package.json
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - services/api/**
        - services/audio-processor/src/**
        - packages/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: voice-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString
      - key: AUDIO_PROCESSOR_URL
        fromService:
          type: pserv
          name: voice-audio-processor
          property: hostport

  - type: web
    name: voice-admin
    runtime: static
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/admin build
    staticPublishPath: apps/admin/dist
    autoDeploy: true
    autoDeployTrigger: checksPass
    previews:
      generation: manual
    buildFilter:
      paths:
        - package.json
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - apps/admin/**
        - packages/content-schema/**
        - packages/shared-types/**
        - packages/ui-tokens/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - fromGroup: voice-shared-env

  - type: pserv
    name: voice-audio-processor
    region: oregon
    runtime: docker
    plan: pro-4gb
    dockerContext: .
    dockerfilePath: services/audio-processor/Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    autoDeployTrigger: checksPass
    disk:
      name: voice-audio-model-cache
      mountPath: /var/cache/voice-audio
      sizeGB: 50
    buildFilter:
      paths:
        - services/audio-processor/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - fromGroup: voice-audio-env
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: voice-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString

  - type: worker
    name: voice-audio-worker
    region: oregon
    runtime: docker
    plan: pro-4gb
    dockerContext: .
    dockerfilePath: services/audio-processor/Dockerfile
    dockerCommand: python -m voice_audio.worker
    autoDeploy: true
    autoDeployTrigger: checksPass
    disk:
      name: voice-audio-worker-model-cache
      mountPath: /var/cache/voice-audio
      sizeGB: 50
    buildFilter:
      paths:
        - services/audio-processor/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - fromGroup: voice-audio-env
      - key: DATABASE_URL
        fromDatabase:
          name: voice-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString

  - type: worker
    name: voice-analytics-worker
    region: oregon
    runtime: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/analytics-worker build
    startCommand: node services/analytics-worker/dist/index.js
    autoDeploy: true
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - package.json
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - services/analytics-worker/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: voice-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString

  - type: worker
    name: voice-notification-worker
    region: oregon
    runtime: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/notification-worker build
    startCommand: node services/notification-worker/dist/index.js
    autoDeploy: true
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - package.json
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - services/notification-worker/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: voice-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString
      - key: API_BASE_URL
        fromService:
          type: web
          name: voice-api
          property: hostport

  - type: cron
    name: voice-weekly-summary-cron
    region: oregon
    runtime: node
    plan: starter
    schedule: "0 15 * * 1"
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/analytics-worker build
    startCommand: node services/analytics-worker/dist/weekly-summary.js
    autoDeploy: true
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - services/analytics-worker/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: voice-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString

  - type: cron
    name: voice-data-retention-cron
    region: oregon
    runtime: node
    plan: starter
    schedule: "30 9 * * *"
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/api build
    startCommand: node services/api/dist/jobs/data-retention.js
    autoDeploy: true
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - services/api/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: voice-postgres
          property: connectionString
