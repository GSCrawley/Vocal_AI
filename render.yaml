# Render Blueprint for VOICE.
# Schema: https://render.com/schema/render.yaml.json
#
# This blueprint declares the Render-managed infrastructure the project will
# need as the scaffold is fleshed out. Supabase remains the architecture's
# database/auth/storage/realtime provider and is configured through synced
# secrets here rather than provisioned by Render.
#
# Some commands and Dockerfiles referenced here are build targets for the
# corresponding agents in AGENT.MD and will not deploy successfully until those
# services are implemented.

version: "1"

envVarGroups:
  - name: voice-shared-env
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: VITE_API_BASE_URL
        sync: false
      - key: AUDIO_STORAGE_OPT_IN_DEFAULT
        value: "false"
      - key: FEATURE_KARAOKE_MODE
        value: "false"
      - key: FEATURE_STYLE_PACKS
        value: "false"
      - key: FEATURE_PUSH_NOTIFICATIONS
        value: "false"
      - key: FEATURE_REALTIME_FILLER_DETECTION
        value: "false"
      - key: FEATURE_AVATAR_TTS
        value: "false"

  - name: voice-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_STORAGE_BUCKET_AUDIO
        value: user-audio
      - key: SUPABASE_STORAGE_BUCKET_KARAOKE
        value: karaoke-assets
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: EXPO_PROJECT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

services:
  - type: keyvalue
    name: voice-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: voice-api
    region: oregon
    runtime: node
    plan: starter
    numInstances: 1
    healthCheckPath: /healthz
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/api... build
    startCommand: node services/api/dist/index.js
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 60
  
    buildFilter:
      paths:
        - package.json
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - services/api/**
        - services/audio-processor/src/**
        - packages/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString

  - type: worker
    name: voice-analytics-worker
    region: oregon
    runtime: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/analytics-worker... build
    startCommand: node services/analytics-worker/dist/index.js
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - package.json
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - services/analytics-worker/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString

  - type: worker
    name: voice-notification-worker
    region: oregon
    runtime: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.0.0 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @voice/notification-worker... build
    startCommand: node services/notification-worker/dist/index.js
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - package.json
        - pnpm-workspace.yaml
        - tsconfig.base.json
        - services/notification-worker/**
        - packages/shared-types/**
    envVars:
      - fromGroup: voice-shared-env
      - fromGroup: voice-secrets
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: voice-redis
          property: connectionString
      - key: API_BASE_URL
        fromService:
          type: web
          name: voice-api
          property: hostport
